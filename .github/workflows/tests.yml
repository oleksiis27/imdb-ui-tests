name: IMDb UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: Run tests
        run: ./gradlew test -Dheadless=true -Dpage.load.timeout=120 -Dtimeout=15

      - name: Load Allure test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy Allure history
        if: always()
        run: |
          mkdir -p build/allure-results/history
          if [ -d gh-pages/history ]; then
            cp -r gh-pages/history/* build/allure-results/history/ || true
          fi

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: build/allure-results
          allure_history: allure-history
          keep_reports: 10

      - name: Remove .git from allure-history
        if: always()
        run: sudo rm -rf allure-history/.git

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          force_orphan: true

      - name: Post Allure report link
        if: always()
        run: echo "📊 Allure Report → https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
